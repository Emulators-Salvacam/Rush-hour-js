<!DOCTYPE html>
<html>
    <head>
        <meta content="text/html;charset=utf-8" http-equiv="Content-Type">
        <meta content="utf-8" http-equiv="encoding">
        <script src="code.js"></script>
        <style type="text/css">
            .header{display:flex;align-items:center;justify-content:space-between;padding-left:10px;padding-right:10px}.justify-center{display:flex;align-items:center;justify-content:center}.justify-around{display:flex;align-items:center;justify-content:space-around;}
        </style>
        <link rel="stylesheet" type="text/css" href="stylesheet.css"> 
        <title>
            Rush Hour
        </title>

    </head>
    <body style="background-color:#34568B">    
        <div class="header" style="margin-bottom: 10px;">
            <div><span id="tituloApp" class="content-head is-center" style="font-size: 1.5em; padding-left: 60px; margin-bottom: 15px;">RUSH HOUR</span></div>
            <div><a href="https://github.com/Emulators-Salvacam/Rush-hour-js" title="GitHub" target="_blank" rel="noopener"><img src="./github.png" alt="GitHub" height="25"></a></div>
        </div>

        <div class="mode">
            <button class="button" onclick="set_mode(0)">Intermediate</button>
            <button class="button" onclick="set_mode(1)">Advanced</button>
            <button class="button" onclick=set_mode(2)>Expert</button>
            <button class="button" onclick=set_mode(3)>Grandmaster</button>
        </div>

        <div id="table_container" class="table_container"></div>
        <br/>
        <br/>
        <div class="reset">
            <button class="reset_button" onclick="reset()">Reset level</button>
        </div>

    </body>
</html>
